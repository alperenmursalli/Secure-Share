# =====================================================================
#  VULN PROFILE  -  SADECE YETKILI PENTEST / EGITIM ORTAMI ICIN
#  Calistirma:  SPRING_PROFILES_ACTIVE=vuln ./mvnw spring-boot:run
#  Bu profil bilerek guvensizdir. Internete acik deploy ETMEYIN.
# =====================================================================

spring.application.name=secshare-vuln

# --- H2 in-memory: Docker/Postgres olmadan calisan hedef ---
spring.datasource.url=jdbc:h2:mem:secshare;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 console recon icin acik (SecurityConfig permitAll)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- Actuator: recon asamasi (env icinde secret sizar) ---
management.endpoints.web.exposure.include=*
management.endpoint.env.show-values=ALWAYS
management.info.env.enabled=true

app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.storage.base-path=${STORAGE_PATH:uploads}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.port=${PORT:8080}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

logging.level.org.springframework.security=DEBUG

# =====================================================================
#  ZAFIYET BAYRAKLARI  -  her satir tek bir acigi acar/kapatir
#  Hepsini false yaparsan uygulama GUVENLI moda doner (before/after).
# =====================================================================
vuln.enabled=true
vuln.jwt.weak-secret=true
vuln.jwt.allow-none=false
vuln.auth.user-enum=true
vuln.auth.no-rate-limit=true
vuln.auth.mass-assignment=true
vuln.access.legacy-download=true
vuln.search.sqli=true
vuln.file.path-traversal=true
vuln.import.ssrf=true
vuln.import.xxe=true
vuln.import.yaml=true
vuln.process.cmd-injection=true
vuln.process.zip-slip=true
vuln.serve.stored-xss=true
vuln.cors.wildcard=true
vuln.errors.verbose=true
